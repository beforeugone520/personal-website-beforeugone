<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 · BeforeUgone</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23d8431d'/%3E%3Ctext x='30' y='46' font-family='Georgia, serif' font-size='40' font-style='italic' font-weight='600' fill='white' text-anchor='middle'%3EU%3C/text%3E%3Ccircle cx='50' cy='44' r='4.5' fill='white'/%3E%3C/svg%3E">
<script>
  // 主题：与全站共用 localStorage（404 会在任意路径下渲染，资源一律用绝对路径）
  (function () {
    var root = document.documentElement;
    var saved = null;
    try { saved = localStorage.getItem('bug-theme'); } catch (e) {}
    if (saved) root.setAttribute('data-theme', saved);
    else if (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) root.setAttribute('data-theme', 'dark');
  })();
</script>
<link rel="stylesheet" href="/css/site.css">
</head>
<body>
<main style="min-height:82vh; display:grid; place-items:center; text-align:center; padding:56px 24px;">
  <div>
    <p class="meta num" style="letter-spacing:.2em;">404</p>
    <h1 style="font-size:clamp(34px, 6vw, 60px); margin:14px 0 10px;">这页还没做出来。</h1>
    <p class="lead" style="color:var(--muted); margin:0 auto; max-width:34ch;">链接可能拼错了，或者这一页真的不存在——先做出来的，都在主页。</p>
    <p style="margin-top:32px;"><a class="btn btn-primary btn-arrow" href="/">回到主页</a></p>
  </div>
</main>
<footer class="pagefoot">
  <div class="container row-between">
    <span class="sign">Before U Gone · 先做出来。</span>
  </div>
</footer>
</body>
</html>
